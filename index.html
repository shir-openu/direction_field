    :root {
      /* ---- Dark palette (navy) ---- */
      --bg: #0e1424;            /* page background */
      --panel: #111827;         /* canvas/card bg */
      --ink: #e5e7eb;           /* primary text */
      --muted: #9aa6b2;         /* secondary text */
      --grid: #1f2a3a;          /* grid lines */
      --axis: #e5e7eb;          /* axes */
      --field: #9fb3c8;         /* slope field */

      /* light pink dashed for nullclines */
      --nullcline: #f9a8d4;

      --c1: #60a5fa;            /* blue-400 */
      --c2: #34d399;            /* green-400 */
      --c3: #f87171;            /* red-400 */
      --handle-outline: #0e1424;/* ring same as bg */

      --control-bg: #0f172a;    /* controls bg */
      --control-border: #233044;/* controls border */
      --control-hover: #1b2638; /* controls hover */
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans";
      color: var(--ink);
      background: var(--bg);
    }
    .wrap { max-width: 1160px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .muted { color: var(--muted); font-size: 14px; }
    .bar { display:flex; flex-wrap:wrap; gap:16px; align-items:center; margin:16px 0; }

    .eqn {
      display:flex; align-items:center; gap:8px;
      padding: 6px 10px; border:1px solid var(--control-border);
      border-radius:10px; background: var(--control-bg); min-width:260px; color: var(--ink);
    }
    .mq-editable-field, .mq-math-mode { min-height: 32px; }
    .plain {
      min-width: 240px; border: none; outline: none; font-size: 16px;
      background: transparent; color: var(--ink);
    }

    .slider { display:flex; align-items:center; gap:8px; color: var(--muted); font-size: 14px; }
    input[type="range"] { width: 170px; }

    .legend { display:flex; gap:16px; font-size: 14px; align-items:center; color: var(--muted); }
